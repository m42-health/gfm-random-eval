name: CI
on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pandas scikit-learn scipy transformers
    - name: Lint with ruff
      run: |
        ruff check .
    - name: Run tests
      run: |
        echo "Placeholder for pytest"
